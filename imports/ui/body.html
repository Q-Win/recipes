<body>
    <div class="container">
      <header>

        {{> loginButtons}}
      </header>

      <h1>Recipes</h1>
      {{#if currentUser}}
        <form class="new-recipe">
          <label >Name:</label>
          <input type="text" name="recipe" placeholder="Type to add new recipes" onkeypress="if (event.keyCode == 13) {alert('enter'); return false;}" /><br>
          <label>Instructions:</label>
          <input type="text" name="instructions" placeholder="Instructions" /><br>
          <button type="submit">Create Recipe</button>
        </form>
        <div>
          <!-- {{> insertRecipeForm}} -->
        </div>
       {{/if}}
       <div>
        <ul>
          {{#each recipes}}
            {{> recipe}}
          {{/each}}
        </ul>
      </div>
      <div>
      <div>
        <h1> Ingredients </h1>
      </div>
        <ul>
          {{#each ingredients}}
            {{> ingredient}}
          {{/each}}
        </ul>
        {{> createIngredeint}}
      </div>
      <div style="height: 80px;">
      </div>
    </div>
  </body>
