<body>
    <div class="container">
      <header>

        {{> loginButtons}}
      </header>

      <h1>Recipes</h1>
      {{#if currentUser}}
        <div>
          {{> insertRecipeForm}}
        </div>
       {{/if}}
       <div>
        <ul>
          {{#each recipes}}
            {{> recipe}}
          {{/each}}
        </ul>
      </div>
      <div>
      <div>
        <h1> Ingredients </h1>
      </div>
        <ul>
          {{#each ingredients}}
            {{> ingredient}}
          {{/each}}
        </ul>
        {{> createIngredeint}}
      </div>
      <div style="height: 80px;">
      </div>
    </div>
  </body>
